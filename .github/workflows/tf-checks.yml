name: tf-checks
permissions:
  id-token: write
on:
  pull_request:
jobs:
  tf-checks-basic-example:
    uses: clouddrove/github-shared-workflows/.github/workflows/tf-checks.yml@v2
    with:
      working_directory: './examples/basic/'
      provider: 'aws'
      enable_plan: 'true'
    secrets:
      BUILD_ROLE: ${{ secrets.BUILD_ROLE }}
  
  tf-checks-complete-example:
    uses: clouddrove/github-shared-workflows/.github/workflows/tf-checks.yml@v2
    with:
      working_directory: './examples/complete/'
      provider: 'aws'
      enable_plan: 'true'
    secrets:
      BUILD_ROLE: ${{ secrets.BUILD_ROLE }}
  
  tf-checks-only_rules-example:
    uses: clouddrove/github-shared-workflows/.github/workflows/tf-checks.yml@v2
    with:
      working_directory: './examples/only_rules/'
      provider: 'aws'
      enable_plan: 'true'
    secrets:
      BUILD_ROLE: ${{ secrets.BUILD_ROLE }}
  
  tf-checks-prefx_list-example:
    uses: clouddrove/github-shared-workflows/.github/workflows/tf-checks.yml@v2
    with:
       working_directory: './examples/prefix_list/'
       provider: 'aws'
       enable_plan: 'true'
    secrets:
      BUILD_ROLE: ${{ secrets.BUILD_ROLE }}